name: Enterprise-devsecops-pipeline
on: 
  push:
    branches:
      - QA
    paths:
      - client/**
      - server/**
      - .github/workflows/qa-cicd.yml
jobs:
  gitleaks-scan:
    name: gitleaks Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v7.0.0

      - name: Start Gitleaks Scan
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/repo" \
            zricethezav/gitleaks:latest detect \
            --source=/repo \
            --report-format=json \
            --report-path=/repo/gitleaks-report.json \
            --redact \
            --exit-code 0

      - name: Upload a Build Artifact
        uses: actions/upload-artifact@v7
        with:
          name: gitleaks report
          path: gitleaks-report.json
          if-no-files-found: warn
          
  checkov-terraform: 
    name: Checkov Terraform-Scan
    runs-on: ubuntu-latest
    needs: gitleaks-scan
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v7.0.0
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Chekov
        run: pip install checkov
      - name: Run Checkov Terraform-Scan
        run: |
          checkov -d . \
            --framework terraform \
            --output json > checkov-terraform.json || true 

      - name: upload  Checkov Terraform-Scan
        uses: actions/upload-artifact@v7
        with:
          name: terraform report
          path: checkov-terraform.json
          if-no-files-found: warn
          
  checkov-k8s: 
    name: Checkov k8s-Scan
    runs-on: ubuntu-latest
    needs: gitleaks-scan
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v7.0.0
      - name: Setup Python
        uses: actions/setup-python@v6.3.0
        with:
          python-version: "3.11"

      - name: Install Chekov
        run: pip install checkov
      - name: Run Checkov k8s-Scan
        run: |
          checkov -d . \
            --framework kubernetes \
            --output json > checkov-kubernetes.json || true 

      - name: upload  Checkov Kubernetes-Scan
        uses: actions/upload-artifact@v7
        with:
          name: kubernetes report
          path: checkov-kubernetes.json
          if-no-files-found: warn       

  checkov-docker: 
    name: Checkov docker-Scan
    runs-on: ubuntu-latest
    needs: gitleaks-scan
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v7.0.0
      - name: Setup Python
        uses: actions/setup-python@v6.3.0
        with:
          python-version: "3.11"

      - name: Install Chekov
        run: pip install checkov
      - name: Run Checkov docker-Scan
        run: |
          checkov -d . \
            --framework docker \
            --output json > checkov-docker.json || true 

      - name: upload  Checkov docker-Scan
        uses: actions/upload-artifact@v7
        with:
          name: docker report
          path: checkov-docker.json
          if-no-files-found: warn   
          
  client-trivy:
    name: Client Trivy-Scan
    runs-on: ubuntu-latest
    needs: gitleaks-scan
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
  
      - name: Install Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          version: latest
          cache: true
  
      - name: Verify Trivy Installation
        run: |
          trivy --version
          which trivy
          ls -la client/  # Verify client directory exists

      - name: Scan client folder (JSON)
        run: |
          trivy fs ./client \
            --format json \
            --output client-trivy-scan-report.json \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --scanners vuln \
            --exit-code 0
  
      - name: Scan client folder (table)
        run: |
          trivy fs ./client \
            --format table \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --scanners vuln \
            --exit-code 0 > client-trivy-scan-report.txt
  
      - name: Upload JSON report
        uses: actions/upload-artifact@v4
        with:
          name: client-trivy-report-json
          path: client-trivy-scan-report.json
          if-no-files-found: warn
  
      - name: Upload table report
        uses: actions/upload-artifact@v4
        with:
          name: client-trivy-report-table
          path: client-trivy-scan-report.txt
          if-no-files-found: warn
