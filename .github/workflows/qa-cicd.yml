name: Enterprise-devsecops-pipeline
on: 
  push:
    branches:
      - QA
    paths:
      - client/**
      - server/**
      - .github/workflows/qa-cicd.yml
jobs:
  gitleaks-scan:
    name: gitleaks Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v7.0.0

      - name: Start Gitleaks Scan
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/repo" \
            zricethezav/gitleaks:latest detect \
            --source=/repo \
            --report-format=json \
            --report-path=/repo/gitleaks-report.json \
            --redact \
            --exit-code 0

      - run: Upload Build Artifact
      - uses: actions/upload-artifact@v7
        with:
          name: gitleaks report
          path: gitleaks-report.json
          if-no-files-found: warn
          
  checkov-terraform: 
    name: Checkov Terraform-Scan
    runs-on: ubuntu-latest
    needs: gitleaks-scan
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v7.0.0
      - name: Setup Python
        uses: action/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Chekov
        run: pip install checkov
      - name: Run Checkov Terraform-Scan
        run: |
          checkov -d . \
            --framework terraform \
            --output json > checkov-terraform.json || true 

      - run: upload  Checkov Terraform-Scan
      - uses: actions/upload-artifact@v7
        with:
          name: terraform report
          path: checkov-terraform.json
          if-no-files-found: warn
          
  checkov-k8s: 
    name: Checkov k8s-Scan
    runs-on: ubuntu-latest
    needs: gitleaks-scan
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v7.0.0
      - name: Setup Python
        uses: action/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Chekov
        run: pip install checkov
      - name: Run Checkov k8s-Scan
        run: |
          checkov -d . \
            --framework kubernetes \
            --output json > checkov-kubernetes.json || true 

      - run: upload  Checkov Kubernetes-Scan
      - uses: actions/upload-artifact@v7
        with:
          name: kubernetes report
          path: checkov-kubernetes.json
          if-no-files-found: warn       

  checkov-docker: 
    name: Checkov docker-Scan
    runs-on: ubuntu-latest
    needs: gitleaks-scan
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v7.0.0
      - name: Setup Python
        uses: action/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Chekov
        run: pip install checkov
      - name: Run Checkov docker-Scan
        run: |
          checkov -d . \
            --framework docker \
            --output json > checkov-docker.json || true 

      - run: upload  Checkov docker-Scan
      - uses: actions/upload-artifact@v7
        with:
          name: docker report
          path: checkov-docker.json
          if-no-files-found: warn       
  
